name: Container Image CI

on:
  push:
    branches:
      - release/v* # for new Omada controller versions
      - bugfix/v* # for fixing build process issues
      - deps/v* # for updating/patching dependencies (Mongo,Java,Ubuntu...)
      - refactor/v* # for build tooling / internal restructuring (build-only, no publish)
      - workflow-dev # for testing workflow chnages on special branch
    tags:
      - v* # Triggers for tags prefixed with 'v'

# Cancel superseded runs on the same branch; never cancel tag (release) runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type == 'branch' }}

env:
  IMAGE_NAME: omada-controller
  IMAGE_TAG:
  IMAGE_TAG_SUFFIX:
  PUSH: "false"
  GITHUB_REGISTRY: ghcr.io/tinoha
  DOCKERHUB_REGISTRY: docker.io/tihal

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      packages: write # Grants permission to push Docker images to GHCR
      contents: write # Allows reading repository content (actions/checkout) and writing (gh release...)

    steps:
      - uses: actions/checkout@v6
        name: Checkout repository

      # Extract version from the trigger source (branch, tag, or static for workflow-dev).
      # Sets PUSH=true for paths that should publish a -dev image to GHCR:
      #   release/v*, deps/v*                -> build + push -dev to GHCR
      #   bugfix/v*, refactor/v*           -> build-only (no publish)
      #   tags v*                          -> build + push to both registries + release
      #   workflow-dev                     -> build-only with a static v6.x tag
      - name: Set IMAGE_TAG and push intent
        run: |
          set -e
          PUSH=false
          if [[ "${GITHUB_REF_NAME}" == "workflow-dev" ]]; then
            # Static v6.x tag for workflow testing (fast, capless, gets a runtime test).
            IMAGE_TAG="6.2.10.17"
            SUFFIX="-dev"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            IMAGE_TAG="${GITHUB_REF_NAME#v}"
            SUFFIX=""
            PUSH=true
          elif [[ "${GITHUB_REF_NAME}" =~ ^(release|deps)/v ]]; then
            IMAGE_TAG="${GITHUB_REF_NAME#*/v}"
            SUFFIX="-dev"
            PUSH=true
          elif [[ "${GITHUB_REF_NAME}" =~ ^(bugfix|refactor)/v ]]; then
            IMAGE_TAG="${GITHUB_REF_NAME#*/v}"
            SUFFIX="-dev"
          else
            echo "Error: cannot determine IMAGE_TAG from ref '${GITHUB_REF_NAME}' (${GITHUB_REF_TYPE})." >&2
            echo "Use a tag like 'v6.2.10.17', a versioned branch like 'release/v6.2.10.17', or push to 'workflow-dev' for static testing." >&2
            exit 1
          fi
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          echo "IMAGE_TAG_SUFFIX=${SUFFIX}" >> $GITHUB_ENV
          echo "PUSH=${PUSH}" >> $GITHUB_ENV

      - name: Check IMAGE_TAG version string is valid
        run: |
          # Accept release tags like 6.2.10.17 / v6.2.10.17 and dev tags like 6.x-dev / v6.x-build-dev
          if [[ ! "${{ env.IMAGE_TAG }}" =~ ^v?([0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?|[0-9]+\.x)(-[A-Za-z0-9_.-]+)?$ ]]; then
            echo "Current IMAGE_TAG value: ${{ env.IMAGE_TAG }}"
            echo "Could not extract valid version string for the IMAGE_TAG variable. Exiting workflow." >&2
            exit 1
          fi

      - name: Log in to GitHub container registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Log in to Docker Hub container registry
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | podman login docker.io -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build the container image (with podman)
        run: |
          echo "./build.sh --set-ver ${{ env.IMAGE_TAG }}"
          ./build.sh --set-ver ${{ env.IMAGE_TAG }}

      - name: List images
        run: podman image ls

      # Runtime-test v6.x images only. v6.x installs via install.sh init-cluster-mode,
      # which does not start the service, so a separate run test is needed. v5.x is
      # installed via .deb, which starts the service during the build (caps are added
      # by build.sh), so its runtime test effectively happens at build time.
      - name: Test run the v6.x container
        if: startsWith(env.IMAGE_TAG, '6.')
        timeout-minutes: 4
        run: |
          output=$(podman run --rm localhost/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} sudo tpeap start)
          echo "$output"
          echo "$output" | grep -q "Started successfully."

      - name: Push to GitHub container registry (GHCR)
        if: env.PUSH == 'true'
        run: |
          podman tag localhost/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ${{ env.GITHUB_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}${{ env.IMAGE_TAG_SUFFIX }} && \
          podman push --digestfile ghcr.digest ${{ env.GITHUB_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}${{ env.IMAGE_TAG_SUFFIX }}
          echo "GHCR_DIGEST=$(cat ghcr.digest)" >> "$GITHUB_ENV"

      - name: Push to Docker Hub container registry
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          podman tag localhost/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ${{ env.DOCKERHUB_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} && \
          podman push --digestfile dockerhub.digest  ${{ env.DOCKERHUB_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          echo "DOCKERHUB_DIGEST=$(cat dockerhub.digest)" >> "$GITHUB_ENV"

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          # TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail  # Exit on error, treat unset variables as errors, and fail if any command in a pipeline fails
          
          # Prepare variables for release notes with image references and digests
          GHCR_IMAGE="${GITHUB_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          DOCKERHUB_IMAGE="${DOCKERHUB_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          GHCR_DIGEST_IMAGE="${GITHUB_REGISTRY}/${IMAGE_NAME}@${GHCR_DIGEST}"
          DOCKERHUB_DIGEST_IMAGE="${DOCKERHUB_REGISTRY}/${IMAGE_NAME}@${DOCKERHUB_DIGEST}"
          
          # Render release notes with image references and digests
          {
            echo "Published container images for version \`${IMAGE_TAG}\`"
            echo
            echo "## Images"
            echo
            echo '```bash'
            echo "docker pull ${GHCR_IMAGE}"
            echo "docker pull ${DOCKERHUB_IMAGE}"
            echo '```'
            echo
            echo "## Image digests"
            echo
            echo '```text'
            echo "${GHCR_DIGEST_IMAGE}"
            echo "${DOCKERHUB_DIGEST_IMAGE}"
            echo '```'
            echo
            echo "See the README for usage and deployment documentation."
          } > release-notes.md

          gh release create "${IMAGE_TAG}" \
              --title "${IMAGE_TAG}" \
              --notes-file release-notes.md \
              --verify-tag \
              --latest
